<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMI TRADERS - Product Catalog</title>
    <style>
        /* Black & White Theme */
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background: #000; color: #fff; padding: 20px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        
        /* Grid System for Products */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border: 1px solid #ddd; padding: 15px; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Product Images */
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        
        .product-name { font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .whatsapp-btn { display: inline-block; background: #25D366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        footer { text-align: center; padding: 20px; background: #000; color: #fff; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h1>OMI TRADERS</h1>
    <p>Hamara Latest Stock Dekhein</p>
</header>

<div class="container">
    <div class="product-grid">

        <div class="product-card">
            <img src="https://via.placeholder.com/300x200?text=Product+1" alt="Product Image">
            <div class="product-name">Product Ka Naam Yahan Likhein</div>
            <p>Short Description: Is product ki khasiyat batayein.</p>
            <a href="https://wa.me/YOURNUMBER" class="whatsapp-btn">Inquiry on WhatsApp</a>
        </div>
        </div>
</div>

<footer>
    <p>&copy; 2026 OMI TRADERS | Visit our Shop</p>
</footer>

</body>
</html>
