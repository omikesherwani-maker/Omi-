<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMI TRADERS - Official Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFDD0; /* Light Cream */
            --text-color: #2D2D2D; 
            --accent-color: #8B5E3C; 
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            background-color: var(--bg-color);
            color: var(--text-color);
            position: relative;
            min-height: 100vh;
        }

        /* Common Aesthetic Background for both screens */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* YAHAN PRODUCT MEDLEY IMAGE KA LINK DAALEIN */
            background-image: url('https://i.ibb.co/image_1.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.15; /* Isse background halka dikhega */
            z-index: -1;
        }

        /* Blessing Screen */
        #blessing-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            /* Cream overlay taaki text aur image saaf dikhe */
            background: rgba(255, 253, 208, 0.85); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
            padding: 20px;
        }

        /* Ganesh Ji Blessing Image */
        .blessing-img {
            width: 280px; /* Size adjust kar sakte hain */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .blessing-text {
            font-size: 22px;
            color: #5D4037;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-enter {
            padding: 15px 45px;
            background: #8B5E3C;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-enter:hover { transform: scale(1.05); background: #5D4037; }

        /* Main Content */
        #main-site { display: none; padding: 20px; }

        header { text-align: center; padding: 40px 0; }
        .logo { width: 160px; margin-bottom: 15px; border-radius: 10px; }

        .category-section { margin-bottom: 60px; }
        .category-title { 
            border-bottom: 4px solid var(--accent-color); 
            display: inline-block;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div id="blessing-screen">
        <img src="GANESH_JI_TRANSPARENT_IMAGE_LINK" alt="Blessing" class="blessing-img">
        
        <div class="blessing-text">
            वक्रतुंड महाकाय सूर्यकोटि समप्रभ।<br>
            निर्विघ्नं कुरुमेदेव सर्वकार्येषु सर्वदा॥<br><br>
            <strong>Welcome to OMI TRADERS</strong>
        </div>
        <button class="btn-enter" onclick="showSite()">MOVE FORWARD ➔</button>
    </div>

    <div id="main-site">
        <header>
            <img src="LOGO_LINK_HERE" alt="OMI TRADERS LOGO" class="logo">
            <h1>OMI TRADERS</h1>
            <p>Serving Excellence in Every Product</p>
        </header>

        <div class="category-section">
            <h2 class="category-title">OUR COLLECTIONS</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://via.placeholder.com/220" alt="Product">
                    <span class="product-name">Product Name</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showSite() {
            document.getElementById('blessing-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
