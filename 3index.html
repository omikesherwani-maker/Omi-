<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMI TRADERS - Digital Catalog</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f9f9f9; }
        header { background: #000; color: #fff; padding: 25px; text-align: center; }
        
        /* Category Navigation */
        nav { background: #333; position: sticky; top: 0; z-index: 100; text-align: center; padding: 10px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        nav a:hover { color: #ffcc00; }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .category-title { border-left: 5px solid #000; padding-left: 10px; margin: 40px 0 20px; text-transform: uppercase; }
        
        /* Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        
        .wa-link { color: #25D366; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; border: 1px solid #25D366; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
