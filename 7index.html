<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMI TRADERS - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFDD0; /* Light Cream */
            --text-color: #333;
            --accent-color: #D4AF37; /* Gold touch */
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            scroll-behavior: smooth;
        }

        /* Blessing Screen */
        #blessing-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        #blessing-screen h1 { font-size: 2.5rem; margin-bottom: 20px; }

        .btn-enter {
            padding: 15px 30px;
            background: var(--text-color);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            border-radius: 5px;
        }

        /* Main Content */
        #main-site { display: none; padding: 20px; }

        header { text-align: center; padding: 40px 0; }
        
        /* Logo Link Here */
        .logo { width: 150px; margin-bottom: 10px; }

        .category-section { margin-bottom: 50px; }
        .category-title { 
            border-bottom: 3px solid var(--text-color); 
            display: inline-block;
            margin-bottom: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Image Link Here */
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product-name { margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="blessing-screen">
        <h1>May your journey be filled with joy and prosperity! ✨</h1>
        <button class="btn-enter" onclick="showSite()">MOVE FORWARD</button>
    </div>

    <div id="main-site">
        <header>
            <img src="https://via.placeholder.com/150" alt="OMI TRADERS LOGO" class="logo">
            <h1>OMI TRADERS</h1>
            <p>Quality Products for Your Daily Needs</p>
        </header>

        <div class="category-section">
            <h2 class="category-title">GIFTS</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://via.placeholder.com/200" alt="Product">
                    <span class="product-name">Product Name</span>
                </div>
                </div>
        </div>

        <div class="category-section">
            <h2 class="category-title">DECORATION</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://via.placeholder.com/200" alt="Product">
                    <span class="product-name">Decor Item 1</span>
                </div>
            </div>
        </div>

        <div class="category-section">
            <h2 class="category-title">TAILORING ITEMS</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://via.placeholder.com/200" alt="Product">
                    <span class="product-name">Thread/Buttons</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        function showSite() {
            document.getElementById('blessing-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        }
    </script>
</body>
</html>
